name: CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push-streamlit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build Streamlit image
        run: |
          docker build \
            -t ghcr.io/chrmorod/project_weather_de_zoomcamp/streamlit:latest \
            -f ./weather/app/Dockerfile \
            ./weather
      - name: Push Streamlit image
        run: |
          docker push ghcr.io/${{ github.repository }}/streamlit:latest
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-streamlit

    steps:
      - name: Deploy to remote server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/weather-data-pipeline
            docker compose pull
            docker compose up -d
