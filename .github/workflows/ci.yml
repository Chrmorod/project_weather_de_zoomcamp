name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary pandas streamlit altair pydeck pytest ruff

      - name: Lint Python
        run: |
          ruff check .

      - name: Compile Python files
        run: |
          python -m compileall .

  dbt-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

      - name: Validate dbt project
        working-directory: ./weather/dbt/weather_project
        env:
          PG_HOST: localhost
          PG_PORT: "5432"
          PG_DB: weather
          PG_USER: root
          PG_PASSWORD: root
        run: |
          dbt deps
          dbt parse --profiles-dir .

  docker-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate docker compose
        run: |
          docker compose -f ./weather/docker-compose.yaml config

