id: weather_pipeline
namespace: zoomcamp.weather

triggers:
  - id: daily_run
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8 * * *"
    timezone: Europe/Madrid

variables:
  cities:
    - Madrid
    - Barcelona
    - Valencia
    - Sevilla
    - Zaragoza
    - Málaga
    - Murcia
    - Palma
    - Bilbao
    - Alicante
    - Córdoba
    - Valladolid
    - Vigo
    - Gijón
    - A Coruña
    - Granada
    - Vitoria
    - Elche
    - Oviedo

tasks:
  - id: fetch_weather
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ vars.cities }}"
    tasks:
      - id: ingest_city_weather
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
          networkMode: weather_default
        containerImage: python:3.11-slim
        namespaceFiles:
          enabled: true
        beforeCommands:
          - pip install requests psycopg2-binary
        env:
          OPENWEATHER_API_KEY: "{{ secret('OPENWEATHER_API_KEY') }}"
          PG_HOST: pgdatabase
          PG_PORT: "5432"
          PG_DB: weather
          PG_USER: root
          PG_PASSWORD: root
          CITY_NAME: "{{ taskrun.value }}"
        commands:
          - python fetch_weather.py

  - id: pyspark_transform
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: weather_default
    containerImage: spark:3.5.1-python3
    namespaceFiles:
      enabled: true
    env:
      PG_HOST: pgdatabase
      PG_PORT: "5432"
      PG_DB: weather
      PG_USER: root
      PG_PASSWORD: root
    commands:
      - mkdir -p /tmp/jars
      - curl -L -o /tmp/jars/postgresql.jar https://jdbc.postgresql.org/download/postgresql-42.7.3.jar
      - /opt/spark/bin/spark-submit --jars /tmp/jars/postgresql.jar transform_weather.py

  - id: dbt_run
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: weather_default
    containerImage: ghcr.io/dbt-labs/dbt-postgres:latest
    namespaceFiles:
      enabled: true
    env:
      PG_HOST: pgdatabase
      PG_PORT: "5432"
      PG_DB: weather
      PG_USER: root
      PG_PASSWORD: root
    commands:
      - cd dbt/weather_project
      - dbt deps
      - dbt debug --profiles-dir .
      - dbt run 
      - dbt test